<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>⅄ᴚO⊥∀⅁ᴚ∩Ԁ</title>

  <style>
    /* Full-page GIF background */
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: #7e40bc;
      background: url("forest.gif") no-repeat center top fixed;
      background-size: cover;
      display: flex;
      justify-content: center;
      overflow-x: hidden;
      padding: 20px 0;
    }

    /* Main content box with flickering glow */
    .content-box {
      position: relative;
      padding: 40px;
      max-width: 900px;
      width: 90%;
      border-radius: 15px;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: hidden;
      background: url("eyes.gif") center/cover no-repeat;
      box-shadow: 0 0 25px #ff0033, 0 0 50px #ff33ff;
      animation: glowFlicker 3s infinite;
    }
    .content-box::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 0;
    }
    .content-box > * {
      position: relative;
      z-index: 1;
    }

    @keyframes glowFlicker {
      0%   { box-shadow: 0 0 20px #ff0033, 0 0 40px #7c0000; }
      10%  { box-shadow: 0 0 35px #ff0033, 0 0 70px #7e0000; }
      20%  { box-shadow: 0 0 22px #ff0033, 0 0 45px #6f0000; }
      30%  { box-shadow: 0 0 38px #ff0033, 0 0 65px #710000; }
      40%  { box-shadow: 0 0 25px #ff0033, 0 0 50px #740000; }
      50%  { box-shadow: 0 0 33px #ff0033, 0 0 60px #5f0000; }
      60%  { box-shadow: 0 0 21px #ff0033, 0 0 42px #730000; }
      70%  { box-shadow: 0 0 37px #ff0033, 0 0 68px #600000; }
      80%  { box-shadow: 0 0 26px #ff0033, 0 0 52px #790000; }
      90%  { box-shadow: 0 0 34px #ff0033, 0 0 64px #6a0000; }
      100% { box-shadow: 0 0 20px #ff0033, 0 0 40px #5e0000; }
    }

    h1 {
      color: #ff0033;
      text-shadow: 0 0 10px #ff0033;
      margin-bottom: 10px;
      text-align: center;
      animation: bounce 2.1s infinite;
    }

    p {
      color: #f08989;
      text-align: center;
      margin-bottom: 20px;
      animation: bounce 2s infinite;
    }

    hr {
      border: 1px solid #ff0033;
      width: 80%;
      margin: 20px 0;
    }

    /* Gallery styling */
    .gallery {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
    }

    .gallery img {
      width: 300px;
      margin: 15px;
      border: 2px solid #ff0033;
      cursor: pointer;
      transition: transform 0.3s, filter 0.3s;
    }

    .gallery img:hover {
      transform: scale(1.05);
      filter: brightness(120%);
    }

    /* Bottom section */
    .bottom-section {
      margin-top: 30px;
      text-align: center;
    }

    .bottom-section img {
      width: 100px;
      margin-bottom: 20px;
      border: 2px solid #000000;
      transition: transform 0.3s, filter 0.3s;
    }

    @keyframes bounce {
      0%,20%,50%,80%,100% { transform: translateY(0); }
      40% { transform: translateY(-15px); }
      60% { transform: translateY(-8px); }
    }

    .silly-message {
      font-size: 20px;
      color: #bf0000;
      text-shadow: 0 0 5px #ff0000;
      margin-bottom: 15px;
      animation: bounce 2s infinite;
    }

    .wip-section {
      font-size: 18px;
      color: #560000;
      text-shadow: 0 0 5px #ff0000;
      margin-top: 15px;
      animation: bounce 2s infinite;
    }

    /* Social icons */
    .socials {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-top: 30px;
    }

    .socials a {
      display: inline-block;
    }

    .social-icon {
      width: 60px;
      cursor: pointer;
      border-radius: 10px;
      box-shadow: 0 0 15px #ff0033, 0 0 30px #ff33ff;
      animation: bounceSocial 2s infinite, glowSocial 3s infinite;
      transition: transform 0.3s, filter 0.3s, box-shadow 0.3s;
    }

    .social-icon:hover {
      transform: translateY(-5px) scale(1.1);
      filter: brightness(130%);
      box-shadow: 0 0 30px #ff0033, 0 0 60px #ff33ff;
    }

    @keyframes bounceSocial {
      0%,20%,50%,80%,100% { transform: translateY(0); }
      40% { transform: translateY(-10px); }
      60% { transform: translateY(-5px); }
    }

    @keyframes glowSocial {
      0%   { box-shadow: 0 0 10px #ff0033, 0 0 20px #ff7474; }
      20%  { box-shadow: 0 0 18px #ff0033, 0 0 35px #ff6c6c; }
      40%  { box-shadow: 0 0 12px #ff0033, 0 0 25px #fd6363; }
      60%  { box-shadow: 0 0 20px #ff0033, 0 0 40px #ff7676; }
      80%  { box-shadow: 0 0 15px #ff0033, 0 0 30px #ff7e7e; }
      100% { box-shadow: 0 0 10px #ff0033, 0 0 20px #ff8383; }
    }

    /* Staggered bounce delays */
    .social-icon:nth-child(1) { animation-delay: 0s, 0s; }
    .social-icon:nth-child(2) { animation-delay: 0.2s, 0s; }
    .social-icon:nth-child(3) { animation-delay: 0.4s, 0s; }

    /* Lightbox */
    #lightbox {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.9);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    #lightbox img {
      max-width: 90%;
      max-height: 90%;
      border: 3px solid #ff0033;
    }

    .close-btn {
      position: absolute;
      top: 20px;
      right: 30px;
      font-size: 40px;
      color: #ff0033;
      cursor: pointer;
      text-shadow: 0 0 10px #ff0033;
      transition: transform 0.2s, text-shadow 0.2s;
    }

    .close-btn:hover {
      transform: scale(1.2);
      text-shadow: 0 0 20px #ff33ff;
    }

    /* Guestbook styling */
    .guestbook-entry {
      color: #ed6161;
      text-shadow: 0 0 5px #ff0000, 0 0 10px #ff5f5f;
      margin-bottom: 10px;
      padding: 5px;
      border-radius: 5px;
    }

    .guestbook-title {
   color: #b80025;          
   text-align: center;       
   text-shadow: 0 0 10px #ff0033; 
   }

    .guestbook-pagination {
      text-align: center;
      margin-top: 10px;
    }

    .guestbook-pagination button {
      background: none;
      border: 1px solid #ec0000;
      color: #930000;
      padding: 3px 8px;
      margin: 0 2px;
      border-radius: 4px;
      cursor: pointer;
      text-shadow: 0 0 3px #ff0000;
      transition: all 0.2s;
      animation: pulseGlow 2s infinite alternate;
    }

    .guestbook-pagination button:hover {
      background-color: rgba(255, 124, 124, 0.2);
      box-shadow: 0 0 5px #ff7c7c;
    }

    @keyframes pulseGlow {
      0% { box-shadow: 0 0 3px #ff0000; }
      50% { box-shadow: 0 0 8px #ff7cb3; }
      100% { box-shadow: 0 0 3px #ff0000; }
    }
  </style>
</head>

<body>

  <!-- Background music -->
  <audio id="bgmusic" loop preload="auto">
    <source src="MUSIC1.mp3" type="audio/mpeg">
  </audio>

  <script>
    document.body.addEventListener("click", function() {
      document.getElementById("bgmusic").play();
    }, { once: true });

    // Lightbox functions
    function openLightbox(src) {
      const lightbox = document.getElementById("lightbox");
      lightbox.querySelector("img").src = src;
      lightbox.style.display = "flex";
    }

    function closeLightbox() {
      document.getElementById("lightbox").style.display = "none";
    }
  </script>

  <!-- Lightbox container -->
  <div id="lightbox">
    <span class="close-btn" onclick="closeLightbox()">✖</span>
    <img src="" alt="Enlarged image">
  </div>

  <!-- Main content box -->
  <div class="content-box">
    <h1>Greetings!</h1>
    <p>I am Carcass! Here is some of my art!</p>

    <hr>

    <!-- Top GIF above art -->
    <img src="picmix.com_2531591.gif" width="100" alt="Top banner">

    <!-- Gallery -->
    <div class="gallery">
      <img src="eon2.png" alt="Eon artwork" onclick="openLightbox(this.src)">
      <img src="jam.png" alt="Jam artwork" onclick="openLightbox(this.src)">
      <img src="aaaaaa.png" alt="Additional artwork" onclick="openLightbox(this.src)">
      <img src="3.png" alt="3 artwork" onclick="openLightbox(this.src)">
    </div>

    <!-- Bottom section -->
    <div class="bottom-section">
      <img src="eyeball2.gif" alt="Silly GIF">
      <div class="silly-message">✡︎□︎◆︎ ❍︎♋︎♎︎♏︎ ♓︎⧫︎ ⧫︎□︎ ⧫︎♒︎♏︎ ♏︎■︎♎︎✏︎ ☞︎♋︎❒︎♏︎⬥︎♏︎●︎●︎ ⧫︎❒︎♋︎❖︎♏︎●︎♏︎❒︎✏︎</div>
      <div class="wip-section"> 👍︎□︎❍︎♓︎■︎♑︎ ⬧︎□︎□︎■︎✏︎ 🕈︎♏︎♌︎♍︎□︎❍︎♓︎♍︎ - Tуга</div>
    </div>

      <!-- Socials row -->
    <div class="socials">
      <a href="https://www.tumblr.com/carc4ss" target="_blank">
        <img src="tumblr.png" alt="Tumblr" class="social-icon">
      </a>
      <a href="https://bsky.app/profile/c4rc4ss.bsky.social" target="_blank">
        <img src="bluesky.png" alt="Bluesky" class="social-icon">
      </a>
      <a href="https://x.com/c4rc4554rt" target="_blank">
        <img src="xlogo.png" alt="twitter" class="social-icon">
      </a>
    </div>

    <h2 class="guestbook-title">Sign My Guestbook!</h2>

    <form id="guestbook-form">
      <input type="text" id="name" placeholder="Your name..." required><br><br>
      <textarea id="message" placeholder="Leave something silly..." required></textarea><br><br>
      <button type="submit">Submit</button>
    </form>

    <div id="guestbook-messages"></div>

   <!-- Load Supabase JS client library -->

   <script type="module">
   import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

   const supabaseUrl = "https://gymuiyygligrezsiclgc.supabase.co";
   const supabaseKey = "sb_publishable_g0DIw52N3bjLps7OycLovw_1Na2Xtdp";

   const supabaseClient = createClient(supabaseUrl, supabaseKey);

   const form = document.getElementById("guestbook-form");
   const messagesDiv = document.getElementById("guestbook-messages");

   const entriesPerPage = 5;
   let currentPage = 1;
   let allEntries = [];

   async function loadMessages() {
    const { data, error } = await supabaseClient
      .from("guestbook")
      .select("*")
      .order("created_at", { ascending: false });

    if (error) {
      console.error("Error loading messages:", error);
      return;
    }

    allEntries = data || [];
    renderPage(currentPage);
  }

   function renderPage(page) {
    messagesDiv.innerHTML = "";

    const start = (page - 1) * entriesPerPage;
    const end = start + entriesPerPage;
    const pageEntries = allEntries.slice(start, end);

    pageEntries.forEach(entry => {
      const div = document.createElement("div");
      div.className = "guestbook-entry";

      const strong = document.createElement("strong");
      strong.textContent = entry.name;

      const text = document.createTextNode(": " + entry.message);

      div.appendChild(strong);
      div.appendChild(text);
      div.appendChild(document.createElement("hr"));

      messagesDiv.appendChild(div);
    });

    renderPagination();
  }

   function renderPagination() {
    const totalPages = Math.ceil(allEntries.length / entriesPerPage);
    if (totalPages <= 1) return;

    const paginationDiv = document.createElement("div");
    paginationDiv.className = "guestbook-pagination";

    for (let i = 1; i <= totalPages; i++) {
      const button = document.createElement("button");
      button.textContent = i;
      button.onclick = () => goToPage(i);
      paginationDiv.appendChild(button);
    }

    messagesDiv.appendChild(paginationDiv);
  }

   function goToPage(page) {
    currentPage = page;
    renderPage(page);
  }

   form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const name = document.getElementById("name").value.trim();
    const message = document.getElementById("message").value.trim();

    if (!name || !message) return;

    const { error } = await supabaseClient
      .from("guestbook")
      .insert([{ name, message }]);

    if (error) {
      console.error("Insert error:", error);
      alert("Something went wrong! Check console.");
      return;
    }

    form.reset();
    await loadMessages();
  });

   loadMessages();
 </script>

  </div>
</body>
</html>
